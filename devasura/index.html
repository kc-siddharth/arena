<!DOCTYPE html>
<!--
  DIGITAL AVALON — phone web client (single file).
  Works two ways:
    • Served BY Google Apps Script  -> talks to backend via google.script.run (no config needed).
    • Hosted on GitHub Pages        -> set API_URL below to your Apps Script /exec URL.
  All names / art / colours / flavour text come from theme.js (do NOT hardcode here).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Arena Game</title>
<link rel="icon" type="image/png" href="../branding/kc_favicon.png">
<link rel="apple-touch-icon" href="../branding/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Mukta:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Defaults = Kathakali Night (dark). applySkin() overrides these at runtime. */
    --bg:#131A18; --panel:#1D2623; --inset:#141B18; --text:#EFE7D3; --muted:#A7A08C;
    --line:#2B3733; --gold:#C7A24A; --good:#2E9366; --evil:#C33B2B; --ok:#5E8F52;
    --accent:#C7A24A; --accent-text:#1a1405; --chip:#26302C; --chip-text:#EFE7D3;
    --font-head:'Marcellus',Georgia,'Times New Roman',serif;
    --font-body:'Mukta',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:var(--font-body); -webkit-font-smoothing:antialiased;}
  #app{max-width:520px; margin:0 auto; min-height:100vh; padding:18px 16px 20px; position:relative;}
  h1,h2,h3{margin:0 0 10px;}
  h1{font-size:32px; letter-spacing:2px; text-align:center; color:var(--gold); font-weight:700; position:relative; font-family:var(--font-head);}
  h2{font-family:var(--font-head); font-weight:700;}
  .sub{text-align:center; color:var(--muted); margin:-4px 0 22px; font-size:13px; letter-spacing:1px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px; margin:0 0 14px;}
  label{display:block; font-size:13px; color:var(--muted); margin:12px 0 6px;}
  input[type=text],input[type=password]{width:100%; padding:14px; font-size:17px; border-radius:12px;
    border:1px solid var(--line); background:var(--inset); color:var(--text); outline:none; font-family:var(--font-body);}
  input:focus{border-color:var(--gold);}
  button{width:100%; padding:15px; font-size:17px; font-weight:700; border:none; border-radius:12px;
    background:var(--accent); color:var(--accent-text); cursor:pointer; margin-top:12px; font-family:var(--font-body);}
  button:active{transform:translateY(1px);}
  button.secondary{background:var(--chip); color:var(--chip-text);}
  button.good{background:var(--good); color:#fff;}
  button.evil{background:var(--evil); color:#fff;}
  button.ok{background:var(--ok); color:#fff;}
  button.gold{background:var(--gold); color:var(--accent-text);}
  button:disabled{opacity:.4; cursor:not-allowed;}
  .row{display:flex; gap:10px;}
  .row>button{margin-top:0;}
  .muted{color:var(--muted); font-size:13px;}
  .center{text-align:center;}
  .code{font-size:40px; font-weight:800; letter-spacing:10px; text-align:center; color:var(--gold);
    background:var(--inset); border:1px dashed var(--line); border-radius:14px; padding:14px; margin:6px 0; font-family:var(--font-head);}
  .avatars{display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-top:8px;}
  .av{font-size:26px; text-align:center; padding:10px 0; background:var(--inset); border:2px solid transparent;
    border-radius:12px; cursor:pointer;}
  .av.sel{border-color:var(--gold); background:color-mix(in srgb, var(--gold) 16%, var(--inset));}
  .av.secret{box-shadow:0 0 10px var(--gold);}
  .plist{display:flex; flex-direction:column; gap:8px; margin-top:8px;}
  .pitem{display:flex; align-items:center; gap:12px; background:var(--inset); border:1px solid var(--line);
    border-radius:12px; padding:10px 12px;}
  .pitem .em{font-size:24px;}
  .pitem .nm{font-weight:700; flex:1;}
  .badge{font-size:11px; padding:3px 8px; border-radius:20px; background:var(--chip); color:var(--muted);}
  .badge.leader{background:var(--gold); color:var(--accent-text);}
  .badge.team{background:var(--accent); color:var(--accent-text);}
  .badge.done{background:var(--ok); color:#fff;}
  .toggle{display:flex; align-items:center; justify-content:space-between; padding:12px 4px; border-bottom:1px solid var(--line);}
  .toggle:last-child{border-bottom:none;}
  .sw{width:52px; height:30px; border-radius:20px; background:var(--chip); position:relative; transition:.15s; flex:0 0 auto;}
  .sw.on{background:var(--ok);}
  .sw i{position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; transition:.15s;}
  .sw.on i{left:25px;}
  .rolecard{border-radius:18px; padding:26px 20px; text-align:center; margin-bottom:14px;}
  .rolecard.good{background:var(--panel); background:color-mix(in srgb, var(--good) 16%, var(--panel)); border:1px solid var(--good);}
  .rolecard.evil{background:var(--panel); background:color-mix(in srgb, var(--evil) 16%, var(--panel)); border:1px solid var(--evil);}
  .rolecard .rn{font-size:30px; font-weight:800; margin:6px 0; font-family:var(--font-head);}
  .rolecard .em{font-size:46px; line-height:1;}
  .rolecard .side{font-size:13px; letter-spacing:3px; text-transform:uppercase;}
  .art{width:64px; height:64px; object-fit:contain; vertical-align:middle;}
  .quests{display:flex; gap:8px; justify-content:center; margin:14px 0;}
  .q{width:52px; height:64px; border-radius:12px; border:2px solid var(--line); display:flex;
    flex-direction:column; align-items:center; justify-content:center; background:var(--inset); font-size:12px; color:var(--muted);}
  .q.success{border-color:var(--good); color:var(--good);}
  .q.fail{border-color:var(--evil); color:var(--evil);}
  .q .n{font-size:11px;} .q .r{font-size:22px; font-weight:800;}
  .q.cur{box-shadow:0 0 0 2px var(--gold);}
  .dots{display:flex; gap:6px; justify-content:center; margin:6px 0 0;}
  .dot{width:10px; height:10px; border-radius:50%; background:var(--chip);}
  .dot.on{background:var(--evil);}
  .toast{position:fixed; left:50%; bottom:64px; transform:translateX(-50%); background:rgba(8,6,4,.86); color:#fff;
    padding:10px 16px; border-radius:20px; font-size:14px; z-index:50; max-width:90%; text-align:center;}
  .lbrow{display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid var(--line);}
  .lbrow .rank{width:24px; color:var(--muted); font-weight:700;}
  .lbrow .em{font-size:22px;}
  .lbrow .nm{flex:1; font-weight:700;}
  .lbrow .st{font-size:12px; color:var(--muted); text-align:right;}
  .hint{font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5;}
  .spin{display:inline-block; width:18px; height:18px; border:3px solid var(--line); border-top-color:var(--gold);
    border-radius:50%; animation:sp .8s linear infinite; vertical-align:middle;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .pill{display:inline-block; background:var(--inset); border:1px solid var(--line); border-radius:20px; padding:4px 12px; margin:3px; font-size:13px;}
  .q.done{cursor:pointer;}
  .q.done:active{transform:translateY(1px);}
  /* overlay modal (role & mission details) */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; padding:16px; z-index:100;}
  .sheet{background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:18px; width:100%; max-width:460px; max-height:86vh; overflow:auto;}
  .sheet h3{margin-top:0;}
  /* skin switcher */
  .skins{display:flex; gap:8px; flex-wrap:wrap; margin-top:4px;}
  .skinpill{flex:1; min-width:120px; text-align:center; padding:10px; border-radius:12px; border:1px solid var(--line);
    background:var(--inset); color:var(--text); cursor:pointer; font-size:13px; font-weight:700;}
  .skinpill.sel{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset;}
  .skinpill small{display:block; font-weight:400; color:var(--muted); font-size:11px; margin-top:2px;}
  /* Kc branding */
  #brand{max-width:520px; margin:6px auto 0; padding:14px 16px 22px; display:flex; align-items:center;
    justify-content:center; gap:8px; opacity:.45; cursor:pointer; user-select:none;}
  #brand:hover{opacity:.8;}
  .kc{display:inline-block; vertical-align:middle;}
  #brand .kc{width:22px; height:22px;}
  #brand span{font-size:12px; letter-spacing:2px; color:var(--muted);}
  .kcwatermark{position:absolute; top:-8px; right:-4px; width:30px; height:30px; opacity:.22; pointer-events:none;}
  .kcwatermark .kc{width:100%; height:100%;}
  @keyframes egg{0%{transform:scale(1)}50%{transform:scale(1.4) rotate(8deg)}100%{transform:scale(1)}}
  .egg{animation:egg .5s ease;}
</style>
</head>
<body>
<div id="app"><div class="center" style="margin-top:40vh"><span class="spin"></span></div></div>
<div id="brand"></div>

<script src="theme.js?v=2"></script>
<script>
/* ============================================================
   CONNECTION CONFIG
   - Leave API_URL blank when the page is served BY Apps Script.
   - For GitHub Pages: paste your Apps Script Web App /exec URL here.
   ============================================================ */
var API_URL = "https://script.google.com/macros/s/AKfycby8_deWekE3o7XJLqOxCk6F9S2M4n5IA_6OjGcVfYkwlYbg04lLUKHHHYrcR4odeIvL/exec"; // e.g. "https://script.google.com/macros/s/AKfy.../exec"

var USE_GAS = (typeof google !== "undefined" && google.script && google.script.run);

function callApi(action, payload){
  payload = payload || {};
  if (USE_GAS && !API_URL){
    return new Promise(function(res,rej){
      google.script.run.withSuccessHandler(res).withFailureHandler(function(e){rej(e);}).api(action, payload);
    });
  }
  return fetch(API_URL, {
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"}, // simple request -> no CORS preflight
    body: JSON.stringify({action:action, payload:payload})
  }).then(function(r){ return r.json(); });
}

/* ============================================================
   THEME BOOT  (colours, title, Kc branding + easter eggs)
   ============================================================ */
// The real Kc monogram (hand-drawn double gold ring). Relative to games/<game>/.
var BRAND_SRC = "../branding/kc_monogram.png";
function kcMark(){ return '<img class="kc" src="'+BRAND_SRC+'" alt="Kc">'; }
function applyTheme(){
  document.title = THEME.appTitle;
  var b=document.getElementById("brand");
  b.innerHTML = kcMark("kcg") + '<span>KC’S ARENA</span>';
  b.onclick = brandEgg;
}

/* ---- Visual skins (colours). Player choice persists in S.skin. ---- */
function currentSkin(){ return (S.skin && SKINS[S.skin]) ? S.skin : DEFAULT_SKIN; }
function applySkin(key){
  var sk = SKINS[key] || SKINS[DEFAULT_SKIN];
  var r = document.documentElement.style;
  Object.keys(sk.vars).forEach(function(k){ r.setProperty(k, sk.vars[k]); });
  document.body.setAttribute("data-mode", sk.mode);
  S.skin = SKINS[key] ? key : DEFAULT_SKIN; save();
}

/* ---- Easter eggs (subtle) ----
   1) Tap the title 7x  -> unlock a secret golden crown avatar.
   2) Tap the Kc footer 3x -> a hidden dedication.                       */
var eggTitle=0, eggBrand=0, eggTimer=null;
var SECRET_AVATARS=["👑","🕉️","⚜️"];
function titleEgg(node){
  eggTitle++;
  node.classList.remove("egg"); void node.offsetWidth; node.classList.add("egg");
  clearTimeout(eggTimer); eggTimer=setTimeout(function(){eggTitle=0;},1500);
  if(eggTitle>=7){
    eggTitle=0;
    if(!S.kc){ S.kc=true; save(); toast("👑 Secret avatars unlocked — look again!"); if(!S.roomCode) screenHome(); }
    else toast("👑 Kc was here.");
  }
}
function brandEgg(){
  eggBrand++;
  if(eggBrand>=3){ eggBrand=0; toast("⚔️  Built by Kc — may your parties be ever blessed."); }
}

/* ============================================================
   SESSION (persisted so a refresh doesn't drop you)
   ============================================================ */
var S = load();
function load(){
  try{ return JSON.parse(localStorage.getItem("arena")||"{}"); }catch(e){ return {}; }
}
function save(){ localStorage.setItem("arena", JSON.stringify(S)); }

var el = document.getElementById("app");
var pollTimer = null, lastSig = "", selectedTeam = [];

function toast(msg){
  var t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(function(){t.remove();},2600);
}
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
function titleBlock(){
  return '<h1 id="ttl">'+esc(THEME.appTitle)+'<span class="kcwatermark">'+kcMark("kcw")+'</span></h1>'+
         '<div class="sub">'+esc(THEME.appSubtitle)+'</div>';
}
function wireTitle(){ var t=document.getElementById("ttl"); if(t) t.onclick=function(){ titleEgg(t); }; }

/* ============================================================
   BOOT
   ============================================================ */
applyTheme();
applySkin(currentSkin());
render();

function render(){
  if (!S.roomCode || !S.playerId){ stopPoll(); return screenHome(); }
  startPoll();
}

/* ---------- HOME ----------
   Anyone can JOIN with just a room code. Only the HOST needs the password
   to CREATE a room. */
function screenHome(){
  el.innerHTML =
    titleBlock()+
    '<div class="card">'+
      '<label>Your name</label>'+
      '<input id="nm" type="text" maxlength="14" placeholder="e.g. Kc" value="'+esc(S.name||"")+'">'+
      '<label>Pick your avatar</label>'+
      '<div class="avatars" id="avs"></div>'+
    '</div>'+
    '<div class="card">'+
      '<h3>Join a room</h3>'+
      '<div class="muted" style="margin-bottom:6px">No password needed — just the room code from your host.</div>'+
      '<input id="join" type="text" maxlength="8" placeholder="ROOM CODE" style="text-transform:uppercase">'+
      '<button id="joinbtn" class="gold">Join room</button>'+
    '</div>'+
    '<div class="card">'+
      '<h3>Host a new room</h3>'+
      '<div class="muted" style="margin-bottom:6px">Only the host needs the password.</div>'+
      '<input id="pw" type="password" placeholder="host password" autocomplete="off" value="'+esc(S.password||"")+'">'+
      '<button id="create" class="secondary">Create room</button>'+
    '</div>'+
    '<button id="lb" class="secondary">🏆 Leaderboard</button>'+
    '<div class="card"><label>Theme</label><div class="skins" id="skins"></div></div>';
  wireTitle();
  renderSkins();

  var AV = (THEME.avatars||[]).slice();
  if(S.kc) AV = SECRET_AVATARS.concat(AV);
  var box = document.getElementById("avs");
  if(!S.avatar || AV.indexOf(S.avatar)<0) S.avatar = AV[0];
  AV.forEach(function(a){
    var secret = SECRET_AVATARS.indexOf(a)>=0;
    var d=document.createElement("div"); d.className="av"+(S.avatar===a?" sel":"")+(secret?" secret":""); d.textContent=a;
    d.onclick=function(){
      S.avatar=a; save();
      // Update the highlight in place — do NOT re-render (that would wipe the
      // name / room-code / password fields the player has already typed).
      Array.prototype.forEach.call(box.children, function(c){ c.classList.remove("sel"); });
      d.classList.add("sel");
    };
    box.appendChild(d);
  });

  document.getElementById("joinbtn").onclick=function(){
    var name=document.getElementById("nm").value.trim();
    var code=document.getElementById("join").value.trim().toUpperCase();
    if(!name){ toast("Enter your name"); return; }
    if(!code){ toast("Enter a room code"); return; }
    S.name=name; save(); this.disabled=true; this.textContent="Joining…";
    callApi("joinRoom",{name:name,avatar:S.avatar,roomCode:code}).then(function(r){
      if(r&&r.ok){ S.roomCode=r.roomCode; S.playerId=r.playerId; save(); lastSig=""; render(); }
      else { toast(r&&r.error||"Error"); screenHome(); }
    }).catch(function(){ toast("Connection error — check your internet."); screenHome(); });
  };
  document.getElementById("create").onclick=function(){
    var name=document.getElementById("nm").value.trim();
    var pw=document.getElementById("pw").value;
    if(!name){ toast("Enter your name"); return; }
    if(!pw){ toast("Enter the host password"); return; }
    S.name=name; S.password=pw; save(); this.disabled=true; this.textContent="Creating…";
    callApi("createRoom",{password:pw,name:name,avatar:S.avatar}).then(function(r){
      if(r&&r.ok){ S.roomCode=r.roomCode; S.playerId=r.playerId; save(); lastSig=""; render(); }
      else { toast(r&&r.error||"Error"); screenHome(); }
    }).catch(function(){ toast("Connection error — check the deployment / API URL."); screenHome(); });
  };
  document.getElementById("lb").onclick=showLeaderboard;
}

// Skin picker (used on the home screen). Applies instantly + persists.
function renderSkins(){
  var box=document.getElementById("skins"); if(!box) return;
  var cur=currentSkin();
  box.innerHTML="";
  Object.keys(SKINS).forEach(function(key){
    var sk=SKINS[key];
    var d=document.createElement("div");
    d.className="skinpill"+(key===cur?" sel":"");
    d.innerHTML=esc(sk.name)+'<small>'+esc(sk.blurb||"")+'</small>';
    d.onclick=function(){ applySkin(key); renderSkins(); };
    box.appendChild(d);
  });
}

/* ---------- POLLING ---------- */
function startPoll(){ if(pollTimer) return; poll(); pollTimer=setInterval(poll, 2500); }
function stopPoll(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }

function poll(){
  callApi("getState",{roomCode:S.roomCode, playerId:S.playerId}).then(function(r){
    if(!r||!r.ok){ if(r&&/not found|expired|close/i.test(r.error||"")){ toast("Room closed or expired"); leaveToHome(); } return; }
    var st=r.state;
    var sig = signature(st);
    if(sig!==lastSig){ lastSig=sig; draw(st); }
  }).catch(function(){ /* transient */ });
}
function signature(st){
  return [st.phase, st.round, st.rejectCount, st.leaderId, st.voteCount, st.cardCount,
    st.winner, JSON.stringify(st.proposedTeam), st.players.map(function(p){return p.id+p.name+p.avatar+p.acked;}).join(","),
    JSON.stringify(st.quests), st.you&&st.you.role, st.yourVote, st.yourCard].join("|");
}
function leaveToHome(){ stopPoll(); S.roomCode=null; S.playerId=null; save(); lastSig=""; render(); }

/* ---------- MAIN DRAW ---------- */
function draw(st){
  switch(st.phase){
    case "LOBBY": drawLobby(st); break;
    case "ROLE_REVEAL": drawReveal(st); break;
    case "TEAM_SELECT": drawTeamSelect(st); break;
    case "TEAM_VOTE": drawVote(st); break;
    case "QUEST": drawQuest(st); break;
    case "ASSASSIN": drawAssassin(st); break;
    case "GAME_OVER": drawGameOver(st); break;
    default: el.innerHTML='<div class="card">Loading…</div>';
  }
  if(!st) return;
  // Tap any completed Yajna to see who went and how it ended.
  wireQuestTiles(st);
  // A quick way to re-check your own role + secret info during play.
  appendRoleButton(st);
  // Host gets a persistent "Close room" control mid-game (lobby has its own).
  if(st.youAreHost && st.phase!=="LOBBY" && st.phase!=="GAME_OVER") appendHostClose(st);
}
function appendHostClose(st){
  var b=document.createElement("button");
  b.className="secondary"; b.style.marginTop="10px"; b.style.opacity="0.85";
  b.textContent="Close room (host)";
  b.onclick=function(){ hostCloseRoom(st.roomCode); };
  el.appendChild(b);
}

// "My role & info" button — shown during active play (role is hidden then).
function appendRoleButton(st){
  if(!st.you || !st.you.role) return;
  if(st.phase==="LOBBY" || st.phase==="ROLE_REVEAL" || st.phase==="GAME_OVER") return;
  var b=document.createElement("button");
  b.className="secondary"; b.style.marginTop="10px";
  b.textContent="🎭 My role & info";
  b.onclick=function(){ showRole(st); };
  el.appendChild(b);
}

// Make completed Yajna tiles open a details sheet.
function wireQuestTiles(st){
  var tiles=el.querySelectorAll(".q.done");
  Array.prototype.forEach.call(tiles,function(t){
    t.onclick=function(){
      var rd=+t.getAttribute("data-round");
      var q=st.quests.filter(function(x){return x.round===rd;})[0];
      if(q) showQuest(q);
    };
  });
}

/* ---------- overlay sheet + detail views ---------- */
function showModal(inner){
  closeModal();
  var ov=document.createElement("div"); ov.className="overlay"; ov.id="overlay";
  ov.innerHTML='<div class="sheet">'+inner+'<button class="secondary" id="ovclose">Close</button></div>';
  ov.onclick=function(e){ if(e.target===ov) closeModal(); };
  document.body.appendChild(ov);
  document.getElementById("ovclose").onclick=closeModal;
}
function closeModal(){ var o=document.getElementById("overlay"); if(o) o.remove(); }

function showRole(st){
  var you=st.you; if(!you||!you.role) return;
  var html='<div class="rolecard '+you.side+'" style="margin:0 0 12px">'+
    '<div class="em">'+roleEmoji(you.role)+'</div>'+
    '<div class="side">'+esc(factionTagline(you.side))+'</div>'+
    '<div class="rn">'+esc(roleName(you.role))+'</div>'+
    '<div class="muted" style="color:var(--text)">'+esc(roleBlurb(you.role))+'</div></div>';
  if(st.knowledge && st.knowledge.length){
    st.knowledge.forEach(function(k){
      html+='<div class="card" style="margin-bottom:10px"><h3>'+esc(knowLabel(k.key))+'</h3>';
      if(k.people.length===0) html+='<div class="muted">— nobody —</div>';
      else html+='<div>'+k.people.map(function(pp){return '<span class="pill">'+esc(pp.avatar)+' '+esc(pp.name)+'</span>';}).join("")+'</div>';
      html+='</div>';
    });
  } else {
    html+='<div class="hint center">You have no secret information.</div>';
  }
  html+='<div class="hint center">Keep this to yourself!</div>';
  showModal(html);
}

function showQuest(q){
  var ok = q.result==="success";
  var title = THEME.missionWord+" "+q.round;
  var team = (q.team||[]).map(function(p){return '<span class="pill">'+esc(p.avatar)+' '+esc(p.name)+'</span>';}).join("") || '<span class="muted">—</span>';
  var html='<h3 class="center">'+esc(title)+'</h3>'+
    '<div class="center" style="font-size:22px;font-weight:800;margin:4px 0 12px;color:'+(ok?"var(--good)":"var(--evil)")+'">'+
      esc(ok?THEME.successWord:THEME.failWord)+' '+(ok?"✓":"✗")+'</div>'+
    '<div class="muted" style="margin-bottom:6px">Party that went:</div><div>'+team+'</div>'+
    '<div class="muted" style="margin-top:12px">'+q.fails+' '+esc(THEME.failWord)+' card'+(q.fails===1?"":"s")+' played'+
      (q.twoFail?' · needed 2 to fail':'')+'.</div>';
  showModal(html);
}
function hostCloseRoom(code){
  if(!confirm("Close room "+code+" for everyone? The code will stop working.")) return;
  callApi("closeRoom",{roomCode:S.roomCode,playerId:S.playerId}).then(function(){ toast("Room closed"); leaveToHome(); })
    .catch(function(){ toast("Connection error"); });
}
function header(st, title){
  return '<div class="center" style="margin-bottom:6px"><span class="muted">ROOM</span> '+
    '<span style="font-weight:800;letter-spacing:4px;color:var(--gold);font-size:20px">'+esc(st.roomCode)+'</span></div>'+
    (title?'<h2 class="center">'+esc(title)+'</h2>':'');
}
function playerRow(p, extra){
  return '<div class="pitem"><span class="em">'+esc(p.avatar)+'</span><span class="nm">'+esc(p.name)+'</span>'+(extra||"")+'</div>';
}

/* ---------- LOBBY ---------- */
function drawLobby(st){
  var isHost=st.youAreHost;
  var n=st.players.length;
  var html=header(st,T("lobby"));
  html+='<div class="card center"><div class="muted">Share this code with your friends</div>'+
        '<div class="code">'+esc(st.roomCode)+'</div>'+
        '<div class="muted">'+n+' / 10 players • need 5 to start</div></div>';

  html+='<div class="card"><h3>Players</h3><div class="plist">';
  st.players.forEach(function(p){
    html+=playerRow(p, p.id===st.hostId?'<span class="badge leader">HOST</span>':'');
  });
  html+='</div></div>';

  if(isHost){
    var c=st.config;
    html+='<div class="card"><h3>Roles in play</h3>'+
      '<div class="muted" style="margin-bottom:6px">Toggle special roles. The rest fill in as '+esc(factionName("good"))+' / '+esc(factionName("evil"))+'.</div>'+
      cfgToggle("merlin",roleToggle("Merlin"),c.merlin)+
      cfgToggle("percival",roleToggle("Percival"),c.percival)+
      cfgToggle("assassin",roleToggle("Assassin"),c.assassin)+
      cfgToggle("morgana",roleToggle("Morgana"),c.morgana)+
      cfgToggle("mordred",roleToggle("Mordred"),c.mordred)+
      cfgToggle("oberon",roleToggle("Oberon"),c.oberon)+
      '</div>';
    html+='<button id="start" class="gold"'+(n<5||n>10?" disabled":"")+'>Start game</button>';
    html+='<button id="close" class="evil">Close room</button>';
    html+='<div class="hint center">Rooms auto-expire 3 hours after creation.</div>';
  } else {
    html+='<div class="card center muted">Waiting for the host to start…</div>';
    html+='<button id="leave" class="secondary">Leave room</button>';
  }
  el.innerHTML=html;

  if(isHost){
    document.querySelectorAll("[data-cfg]").forEach(function(node){
      node.onclick=function(){
        var key=node.getAttribute("data-cfg");
        var cfg=Object.assign({},st.config); cfg[key]=!cfg[key];
        callApi("setConfig",{roomCode:S.roomCode,playerId:S.playerId,config:cfg}).then(function(r){
          if(!r.ok) toast(r.error); lastSig=""; poll();
        });
      };
    });
    document.getElementById("start").onclick=function(){
      this.disabled=true;
      callApi("startGame",{roomCode:S.roomCode,playerId:S.playerId}).then(function(r){
        if(!r.ok){ toast(r.error); } lastSig=""; poll();
      });
    };
    var cl=document.getElementById("close");
    if(cl) cl.onclick=function(){ hostCloseRoom(st.roomCode); };
  }
  var lv=document.getElementById("leave");
  if(lv) lv.onclick=function(){ callApi("leaveRoom",{roomCode:S.roomCode,playerId:S.playerId}).then(leaveToHome); };
}
function cfgToggle(key,label,on){
  return '<div class="toggle"><span>'+esc(label)+'</span>'+
    '<div class="sw'+(on?" on":"")+'" data-cfg="'+key+'"><i></i></div></div>';
}

/* ---------- ROLE REVEAL ---------- */
function drawReveal(st){
  var you=st.you;
  var html=header(st,"");
  html+='<div class="rolecard '+you.side+'">'+
    '<div class="em">'+roleEmoji(you.role)+'</div>'+
    '<div class="side">'+esc(factionTagline(you.side))+'</div>'+
    '<div class="rn">'+esc(roleName(you.role))+'</div>'+
    '<div class="muted" style="color:var(--text)">'+esc(roleBlurb(you.role))+'</div></div>';

  if(st.knowledge && st.knowledge.length){
    st.knowledge.forEach(function(k){
      html+='<div class="card"><h3>'+esc(knowLabel(k.key))+'</h3>';
      if(k.people.length===0) html+='<div class="muted">— nobody —</div>';
      else html+='<div>'+k.people.map(function(pp){return '<span class="pill">'+esc(pp.avatar)+' '+esc(pp.name)+'</span>';}).join("")+'</div>';
      html+='</div>';
    });
  }
  var waiting=st.players.filter(function(p){return !p.acked;}).length;
  if(you.acked){
    html+='<div class="card center muted">Waiting for '+waiting+' more player(s) to be ready…</div>';
  } else {
    html+='<button id="ready" class="ok">I\'ve memorised my role — Ready</button>';
    html+='<div class="hint">Don\'t show your screen to anyone!</div>';
  }
  el.innerHTML=html;
  var rb=document.getElementById("ready");
  if(rb) rb.onclick=function(){ this.disabled=true;
    callApi("ackRole",{roomCode:S.roomCode,playerId:S.playerId}).then(function(){lastSig="";poll();});
  };
}

/* ---------- shared board bits ---------- */
function questStrip(st){
  var initial=(THEME.missionWord||"M").charAt(0);
  var html='<div class="quests">';
  for(var i=1;i<=5;i++){
    var q=st.quests.filter(function(x){return x.round===i;})[0];
    var cls="q"+(q?(" "+q.result+" done"):"")+((st.round===i&&!q&&st.phase!=="GAME_OVER")?" cur":"");
    var mark=q?(q.result==="success"?"✓":"✗"):"";
    html+='<div class="'+cls+'" data-round="'+i+'"><span class="n">'+initial+i+'</span><span class="r">'+mark+'</span></div>';
  }
  html+='</div><div class="dots">';
  for(var j=0;j<5;j++) html+='<div class="dot'+(j<st.rejectCount?" on":"")+'"></div>';
  html+='</div><div class="center muted" style="font-size:11px;margin-top:4px">'+esc(T("rejectionsNote"))+'</div>';
  return html;
}
function leaderName(st){ var l=st.players.filter(function(p){return p.id===st.leaderId;})[0]; return l?(l.avatar+" "+l.name):"?"; }
function missionTitle(st){ return THEME.missionWord+" "+st.round; }

/* ---------- TEAM SELECT ---------- */
function drawTeamSelect(st){
  var amLeader = st.leaderId===S.playerId;
  var size=st.teamSize;
  var html=header(st,missionTitle(st));
  html+=questStrip(st);
  html+='<div class="card center"><div class="muted">'+esc(T("leader"))+'</div><div style="font-size:20px;font-weight:800;margin-top:4px">'+esc(leaderName(st))+'</div>'+
        '<div class="muted" style="margin-top:6px">must pick <b>'+size+'</b> to '+esc(T("pickTeamVerb"))+'</div></div>';

  if(amLeader){
    selectedTeam = selectedTeam.filter(function(id){ return st.players.some(function(p){return p.id===id;}); });
    html+='<div class="card"><h3>Choose ('+selectedTeam.length+'/'+size+')</h3><div class="plist" id="pick"></div></div>';
    html+='<button id="propose" '+(selectedTeam.length!==size?"disabled":"")+'>Propose this party</button>';
    el.innerHTML=html;
    var pick=document.getElementById("pick");
    st.players.forEach(function(p){
      var on=selectedTeam.indexOf(p.id)>=0;
      var node=document.createElement("div");
      node.className="pitem"; node.style.borderColor=on?"var(--accent)":"var(--line)";
      node.innerHTML='<span class="em">'+esc(p.avatar)+'</span><span class="nm">'+esc(p.name)+'</span>'+
        (on?'<span class="badge team">ON PARTY</span>':'<span class="badge">tap to add</span>');
      node.onclick=function(){
        var i=selectedTeam.indexOf(p.id);
        if(i>=0) selectedTeam.splice(i,1);
        else { if(selectedTeam.length>=size){ toast("Party is full"); return; } selectedTeam.push(p.id); }
        lastSig=""; drawTeamSelect(st);
      };
      pick.appendChild(node);
    });
    document.getElementById("propose").onclick=function(){
      this.disabled=true;
      callApi("proposeTeam",{roomCode:S.roomCode,playerId:S.playerId,team:selectedTeam}).then(function(r){
        if(!r.ok){ toast(r.error); } selectedTeam=[]; lastSig=""; poll();
      });
    };
  } else {
    html+='<div class="card"><h3>Players</h3><div class="plist">';
    st.players.forEach(function(p){ html+=playerRow(p, p.isLeader?'<span class="badge leader">LEADER</span>':''); });
    html+='</div></div>';
    html+='<div class="card center muted">Waiting for '+esc(leaderName(st))+' to choose…</div>';
    el.innerHTML=html;
  }
}

/* ---------- VOTE ---------- */
function drawVote(st){
  var team=st.players.filter(function(p){return p.onTeam;});
  var html=header(st,T("voteTitle"));
  html+=questStrip(st);
  html+='<div class="card"><h3>Proposed party ('+team.length+')</h3><div>'+
        team.map(function(p){return '<span class="pill">'+esc(p.avatar)+' '+esc(p.name)+'</span>';}).join("")+
        '</div><div class="muted" style="margin-top:8px">'+esc(T("leader"))+': '+esc(leaderName(st))+'</div></div>';

  if(st.yourVote){
    html+='<div class="card center"><div class="muted">Your vote</div><div style="font-size:22px;font-weight:800;margin:6px 0;color:'+
      (st.yourVote==="approve"?"var(--ok)":"var(--evil)")+'">'+(st.yourVote==="approve"?"✓ Approve":"✗ Reject")+'</div>'+
      '<div class="muted">'+st.voteCount+' / '+st.players.length+' have voted</div></div>';
  } else {
    html+='<div class="row"><button class="ok" id="approve">✓ Approve</button><button class="evil" id="reject">✗ Reject</button></div>';
    html+='<div class="center muted" style="margin-top:10px">'+st.voteCount+' / '+st.players.length+' have voted</div>';
  }
  el.innerHTML=html;
  function vote(v){ callApi("castVote",{roomCode:S.roomCode,playerId:S.playerId,vote:v}).then(function(r){ if(!r.ok)toast(r.error); lastSig="";poll();}); }
  var a=document.getElementById("approve"), rj=document.getElementById("reject");
  if(a) a.onclick=function(){ a.disabled=true; rj.disabled=true; vote("approve"); };
  if(rj) rj.onclick=function(){ a.disabled=true; rj.disabled=true; vote("reject"); };
}

/* ---------- QUEST ---------- */
function drawQuest(st){
  var onTeam = st.players.some(function(p){return p.id===S.playerId && p.onTeam;});
  var html=header(st,missionTitle(st));
  html+=questStrip(st);
  html+='<div class="center muted" style="margin:2px 0 10px">'+esc(T("leader"))+': <b style="color:var(--text)">'+esc(leaderName(st))+'</b></div>';
  if(st.needsTwoFails) html+='<div class="card center" style="border-color:var(--gold)"><span class="muted">This '+esc(THEME.missionWord.toLowerCase())+' needs <b>2 '+esc(THEME.failWord)+'</b> to fail.</span></div>';

  var team=st.players.filter(function(p){return p.onTeam;});
  html+='<div class="card"><h3>On this '+esc(THEME.missionWord.toLowerCase())+'</h3><div>'+
        team.map(function(p){return '<span class="pill">'+esc(p.avatar)+' '+esc(p.name)+(p.hasPlayedCard?" ✅":"")+'</span>';}).join("")+'</div></div>';

  if(onTeam){
    var mine=st.yourCard;
    if(mine){
      html+='<div class="card center"><div class="muted">You played</div><div style="font-size:22px;font-weight:800;margin:6px 0;color:'+
        (mine==="success"?"var(--ok)":"var(--evil)")+'">'+esc(mine==="success"?THEME.successWord:THEME.failWord)+'</div>'+
        '<div class="muted">'+st.cardCount+' / '+team.length+' cards in</div></div>';
    } else {
      var evil = st.you && st.you.side==="evil";
      html+='<div class="card"><h3>Play your card</h3>';
      html+='<button class="ok" id="succ">'+esc(T("successBtn"))+'</button>';
      if(evil) html+='<button class="evil" id="fail">'+esc(T("sabotageBtn"))+'</button>';
      else html+='<div class="hint">'+esc(T("goodOnlyHint"))+'</div>';
      html+='</div>';
    }
  } else {
    html+='<div class="card center muted">'+st.cardCount+' / '+team.length+' cards played. Waiting for the party…</div>';
  }
  el.innerHTML=html;
  function play(c){ callApi("playCard",{roomCode:S.roomCode,playerId:S.playerId,card:c}).then(function(r){ if(!r.ok)toast(r.error); lastSig="";poll();}); }
  var s=document.getElementById("succ"), f=document.getElementById("fail");
  if(s) s.onclick=function(){ s.disabled=true; if(f)f.disabled=true; play("success"); };
  if(f) f.onclick=function(){ f.disabled=true; s.disabled=true; play("fail"); };
}

/* ---------- ASSASSIN ---------- */
function drawAssassin(st){
  var amAssassin = st.you && st.you.role==="Assassin";
  var html=header(st,T("assassinTitle"));
  html+=questStrip(st);
  html+='<div class="card center"><div class="muted">'+esc(T("assassinLead"))+'</div>'+
        '<div style="font-weight:800;margin-top:6px">'+esc(T("assassinInstruct"))+'</div></div>';
  if(amAssassin){
    html+='<div class="card"><h3>'+esc(T("assassinQuestion"))+'</h3><div class="plist" id="targets"></div></div>';
    el.innerHTML=html;
    var box=document.getElementById("targets");
    st.players.filter(function(p){return p.id!==S.playerId;}).forEach(function(p){
      var node=document.createElement("div");
      node.className="pitem"; node.style.cursor="pointer";
      node.innerHTML='<span class="em">'+esc(p.avatar)+'</span><span class="nm">'+esc(p.name)+'</span><span class="badge">'+esc(T("killBadge"))+'</span>';
      node.onclick=function(){
        if(!confirm("Name "+p.name+" as "+roleName("Merlin")+"?")) return;
        callApi("assassinate",{roomCode:S.roomCode,playerId:S.playerId,targetId:p.id}).then(function(r){ if(!r.ok)toast(r.error); lastSig="";poll();});
      };
      box.appendChild(node);
    });
  } else {
    html+='<div class="card center muted">The strike is being chosen… hold your breath.</div>';
    el.innerHTML=html;
  }
}

/* ---------- GAME OVER ---------- */
function drawGameOver(st){
  var win=st.winner;
  var html=header(st,"");
  html+='<div class="rolecard '+(win==="good"?"good":"evil")+'">'+
    '<div class="side">Victory</div>'+
    '<div class="rn">'+esc(win==="good"?T("victoryGood"):T("victoryEvil"))+'</div>'+
    '<div class="muted" style="color:var(--text)">'+esc(themeReason(st.winReason))+'</div></div>';

  html+=questStrip(st);

  html+='<div class="card"><h3>Everyone\'s roles</h3><div class="plist">';
  (st.revealAll||[]).forEach(function(p){
    var tag = p.role==="Merlin"&&st.assassinTarget===p.id ? '<span class="badge" style="background:var(--evil);color:#fff">🎯 struck</span>' : '';
    html+='<div class="pitem"><span class="em">'+esc(p.avatar)+'</span><span class="nm">'+esc(p.name)+'</span>'+
      '<span class="badge" style="background:'+(p.side==="good"?"var(--good)":"var(--evil)")+';color:#fff">'+roleEmoji(p.role)+' '+esc(roleName(p.role))+'</span>'+tag+'</div>';
  });
  html+='</div></div>';

  html+='<button id="again" class="gold">New game (new room)</button>';
  html+='<button id="lb" class="secondary">🏆 Leaderboard</button>';
  html+='<button id="home" class="secondary">Back to home</button>';
  el.innerHTML=html;

  document.getElementById("again").onclick=function(){
    stopPoll();
    callApi("createRoom",{password:S.password,name:S.name,avatar:S.avatar}).then(function(r){
      if(r&&r.ok){ S.roomCode=r.roomCode; S.playerId=r.playerId; save(); lastSig=""; render(); toast("New room: "+r.roomCode); }
      else toast(r&&r.error||"Error");
    });
  };
  document.getElementById("lb").onclick=showLeaderboard;
  document.getElementById("home").onclick=leaveToHome;
}

/* ---------- LEADERBOARD ---------- */
function showLeaderboard(){
  stopPoll();
  el.innerHTML='<h2 class="center">🏆 Leaderboard</h2><div class="card center"><span class="spin"></span></div>';
  callApi("leaderboard",{}).then(function(r){
    var rows=(r&&r.rows)||[];
    var html='<h2 class="center">🏆 Leaderboard</h2>';
    if(!rows.length){ html+='<div class="card center muted">No games recorded yet. Play one!</div>'; }
    else{
      html+='<div class="card" style="padding:6px 0">';
      rows.forEach(function(a,i){
        var crown = (i===0) ? " 👑" : "";
        html+='<div class="lbrow"><span class="rank">'+(i+1)+'</span><span class="em">'+esc(a.avatar||"🎭")+'</span>'+
          '<span class="nm">'+esc(a.name)+crown+'</span>'+
          '<span class="st">'+a.wins+'W / '+a.games+'G • '+a.winRate+'%<br>'+
          '<span style="color:var(--good)">'+esc(factionName("good").toLowerCase())+' '+a.goodWins+'/'+a.goodGames+'</span> · '+
          '<span style="color:var(--evil)">'+esc(factionName("evil").toLowerCase())+' '+a.evilWins+'/'+a.evilGames+'</span></span></div>';
      });
      html+='</div>';
    }
    html+='<button id="back" class="secondary">Back</button>';
    el.innerHTML=html;
    document.getElementById("back").onclick=function(){ lastSig=""; render(); };
  });
}
</script>
</body>
</html>
